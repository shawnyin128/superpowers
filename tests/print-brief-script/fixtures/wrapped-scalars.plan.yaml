    desc: First step
    test_plan:
      - First test_plan item that wraps across two physical lines and
        whose continuation is at deeper indent than the bullet
      - Second test_plan item, kept on one line for contrast
    coverage_min: 100

decisions: []

execution:
  S1:
    status: done
    confidence: 100
    commits: ["1234abc"]

