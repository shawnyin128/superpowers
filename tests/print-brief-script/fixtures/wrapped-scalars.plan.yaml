    A flag declared as a "- |" block scalar. The parser must handle
    this shape without confusing it with a plain wrapped scalar.
  - |
    Second flag, also a block scalar.

eval:
  rounds:
    - round: 1
      tests:
        S1:
          pass: 1
          fail: 0
          coverage: 100
      blockers: []
